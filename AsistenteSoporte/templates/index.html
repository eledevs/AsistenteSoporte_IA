<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Coquette 🎀</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #fff0f5; /* Rosa muy pálido */
            color: #d87093; 
            padding: 20px;
        }
        h2 { font-style: italic; letter-spacing: 2px; }
        #chat-container {
            width: 450px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(216, 112, 147, 0.2);
            padding: 25px;
            border: 2px solid #ffb6c1;
        }
        #chat-box { 
            height: 400px; 
            overflow-y: auto; 
            margin-bottom: 20px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .message {
            margin: 10px 0;
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.4;
        }
        .user { 
            align-self: flex-end; 
            background: #ffe4e1; 
            color: #b22222;
            border-bottom-right-radius: 2px;
        }
        .bot { 
            align-self: flex-start; 
            background: #fffafa; 
            border: 1px solid #ffb6c1;
            color: #db7093;
            border-bottom-left-radius: 2px;
        }
        .input-area { display: flex; gap: 10px; width: 100%; }
        input { 
            flex: 1; 
            padding: 12px; 
            border: 2px solid #ffb6c1; 
            border-radius: 25px; 
            outline: none;
            color: #d87093;
        }
        button { 
            background: #ffb6c1; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 25px; 
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        button:hover { background: #ff69b4; transform: scale(1.05); }
    </style>
</head>
<body>
    <h2>Soporte Técnico 🎀</h2>
    <div id="chat-container">
        <div id="chat-box">
            <div class="message bot">¡Hola, linda! Soy tu asistente de soporte. ¿En qué puedo ayudarte hoy? ✨</div>
        </div>
        <div class="input-area">
            <input type="text" id="mensaje" placeholder="Escribe tu duda aquí, preciosa...">
            <button onclick="enviar()">Enviar 🎀</button>
        </div>
    </div>

    <script>
        async function enviar() {
            let input = document.getElementById("mensaje");
            let box = document.getElementById("chat-box");
            let texto = input.value;
            if(!texto) return;
            
            box.innerHTML += `<div class="message user"><b>Tú:</b> ${texto}</div>`;
            input.value = "";

            try {
                let response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({mensaje: texto})
                });
                let data = await response.json();
                box.innerHTML += `<div class="message bot"><b>Asistente:</b> ${data.asistente} ✨</div>`;
            } catch (error) {
                box.innerHTML += `<div class="message bot"><b>Asistente:</b> ¡Oh no! Algo salió mal con la conexión. 🎀</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
